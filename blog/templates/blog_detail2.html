  <script src="{% static 'plugins/jquery/jquery-3.7.1.js' %}"></script>
  <script>
    $(function () {
      // 监听窗口的滚动事件
      $(window).scroll(function () {
        // 获取滚动条的位置
        var scrollPosition = $(window).scrollTop();

        // 获取元素离窗口顶部的距离
        var elementOffset = $("#blog-desc").offset().top;

        // 判断元素的位置是否滚动到离窗口顶部300像素的位置
        if (scrollPosition > elementOffset - 0) {
          $(".toc_container").css("height", "100%");
        } else {
          $(".toc_container").css("height", "0");
        }

        // 判断元素的位置是否滚动到离窗口顶部300像素的位置
        if (scrollPosition > elementOffset - 60) {
          $("#top-header").addClass("top-header");
        }
        else{
        $("#top-header").removeClass("top-header");
        
        }
      });

              // 回到顶部
        $(window).scroll(function () {
        var scrollPosition = $(window).scrollTop();
        console.log(scrollPosition);
        if (scrollPosition > 500) {
          $("#back-to-top").css("display", "block");
        } else {
          $("#back-to-top").css("display", "none");
        }
        });

        $("#back-to-top").click(function(){
        document.documentElement.scrollTo({
          top: 0,
          behavior: 'smooth' // 平滑滚动
        });
        });




    });
  </script>
