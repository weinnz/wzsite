<html lang="en">
  <head>
    {% load static %} {% load l10n %}
    <meta charset="utf-8" />

    <link rel="icon" href="{% static 'img/logo-32x32.jpg' %}" sizes="32x32" />
    {% block link %}{% endblock %}

    <style>
      :root {
        --usr-theme-0: #ad1400;
        --usr-theme-invert: #0366d6;
        --usr-theme: #962736;
        --usr-theme-2: #28a745;
        --usr-theme-3: #c5a231;
        --usr-theme-4: #6f42c1;

        --usr-theme-green: #28a745;
        --usr-theme-blue: #0366d6;
        --usr-theme-yellow: #ffd33d;
        --usr-theme-purple: #6f42c1;
        --usr-theme-orange: #f66a0a;

        --usr-theme-5: #4f5671;
        --red-900: #9f1326;
        --red-800: #b42318;
        --red-700: #d92d20;
        --red-600: #e94522;
        --red-500: #f43f5e;
        --red-400: #fb7185;
        --red-300: #fda4af;
        --red-200: #fecdd3;
        --red-u1: #611813;
        --brown-100: #4f5671;
        --brown-800: #926254;
        --blue-900: #1e3a8a;
        --blue-800: #2563eb;
        --blue-700: #3b82f6;
        --blue-600: #60a5fa;
        --blue-500: #93c5fd;
        --blue-400: #bfdbfe;
        --blue-300: #dbeafe;
        --blue-200: #eff6ff;
        --gray-950: #18171d;
        --gray-900: #28272d;
        --gray-800: #31383f;
        --gray-700: #4c4b51;
        --gray-600: #626168;
        --gray-500: #737278;
        --gray-400: #89888d;
        --gray-300: #a4a3a8;
        --gray-200: #bfbfc3;
        --gray-100: #dcdcde;
        --gray-50: #ececef;
        --gray-10: #fbfafd;

        --emoji-word-1: ": )";
        --emoji-word-2: ": (";
        --emoji-word-3: ": >";
        --emoji-word-4: ": <";
        --emoji-word-5: ": P";
        --emoji-word-6: ": b";
        --emoji-word-7: ": D";
        --emoji-word-8: "x )";
        --emoji-word-9: "x (";
        --emoji-word-10: "x >";
        --emoji-word-11: "x <";
        --emoji-word-12: "x P";
        --emoji-word-13: "x b";
        --emoji-word-14: "x D";
      }

      @font-face {
        font-family: "comic neue";
        font-style: normal;
        font-weight: light;
        src:
          local("comic neue"),
          url("{% static 'fonts/Comic-Neue-Light.woff2' %}") format("woff2");
        unicode-range:
          U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC,
          U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215,
          U+FEFF, U+FFFD, U+0100-024F, U+0259, U+1E00-1EFF, U+2020, U+20A0-20AB,
          U+20AD-20CF, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }

@media only screen and (min-width: 2000px) {
   body, html {
	   font-size: 24px !important;
   }
}

@media only screen and (max-width: 960px) {
	.menu-sidebar{
	display: none !important;
}

}

      body,
      html {
        font-size: 20px;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif,
          "Gill Sans",
          "Gill Sans MT",
          Calibri,
          "Trebuchet MS",
          sans-serif;
        scroll-behavior: smooth;
        margin: 0;
        padding: 0;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      #back-to-top {
        position: fixed;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        right: 35px;
        bottom: 5vh;
        width: 36px;
        height: 36px;
        z-index: 999;
        border-radius: 36px;
        padding: 4px;
        display: none;
        text-align: center;
        cursor: pointer;
      }

      #back-to-top .top-svg {
        width: 12px;
        height: 12px;
        padding: auto 0;
      }

      #back-to-top:hover {
        background-color: var(--gray-10);
      }
    </style>

    {% block style %}
    <style>
      /* 侧边菜单栏 */
      .menu-sidebar {
        position: fixed;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        right: 30px;
        /*bottom: 30vh;*/
	bottom: 50%;
	transform: translateY(50%);
        width: 50px;
        height: 300px;
        /*border: #efefef solid 1px;
        border-radius: 10px;*/
        padding: 0;
        z-index: 999;
      }

      .menu-sidebar svg {
        display: inline-block;
        width: 28px;
        height: 28px;
        margin: 4px;
        z-index: inherit;
      }

      .menu-item {
        position: relative;
        display: inline-block;
        width: 36px;
        height: 36px;
        font-size: 0.88rem;
        font-weight: 300;
        color: var(--red-900);
        text-align: right;
        z-index: inherit;
      }

      .menu-sidebar a {
        position: relative;
        display: inline-block;
        text-decoration: none;
        text-align: center;
        width: 36px;
        height: 36px;
        cursor: pointer;
        z-index: inherit;
      }

      .menu-sidebar svg {
        display: inline-block;
        padding: 4px 0;
        width: 100%;
        height: 100%;
      }

      .menu-sidebar .menu-item::before {
        position: absolute;
        display: inline-block;
        right: 100%;
        width: 40px;
        height: 80%;
        transition: all 0.3s linear;
        top: 5px;
        opacity: 0;
        font-family: "Comic Neue", sans-serif;
        font-size: 20px;
        font-weight: 600;
        color: var(--gray-800);
      }

      .menu-sidebar .menu-item:hover::before {
        opacity: 1;
        width: 80px;
        border-bottom: var(--gray-800) solid 1px;
        border-radius: 3px;
      }

      #blog::before {
        content: "Blog";
      }

      #gallery::before {
        content: "Gallery";
      }

      #recipe::before {
        content: "Recipe";
      }

      #works::before {
        content: "Works";
      }

      #notes::before {
        content: "Notes";
      }

      #contact::before {
        content: "Contact";
      }

      {% comment %} #theme-color-option-1 li,
      #theme-color-option-2 li {
        display: inline-block;
        width: 24px;
        height: 24px;
        border: 1px var(--gray-200) solid;
        z-index: 1000;
        cursor: pointer !important;
      } {% endcomment %}
    </style>
    {% endblock %}
  </head>

      <svg
        class="top-svg"
        viewBox="0 0 1024 1024"
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
      >
        <path
          d="M966.4 668.8l-435.2-432c-9.6-9.6-25.6-9.6-35.2 0l-441.6 432c-9.6 9.6-9.6 25.6 0 35.2 9.6 9.6 25.6 9.6 35.2 0l425.6-416 416 416c9.6 9.6 25.6 9.6 35.2 0S976 678.4 966.4 668.8z"

      <div
        style="
          position: absolute;
          dispaly: inline-block;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
        "
      >
        <svg
          class="top-circle1"
          width="36px"
          height="36px"
          viewBox="0 0 102 102"
          stroke="var(--gray-600)"
        >
          <path
            class="top-circle"
            d="M50,1 a49,49 0 0,1 0,98 a49,49 0 0,1 0,-98"
            style="
              transition: stroke-dashoffset 10ms linear;
              stroke-dasharray: 307.919, 307.919;
              stroke-dashoffset: 307.919;
            "
            fill="none"
          ></path>

      </div>
    </div>

    <script src="{% static 'plugins/jquery/jquery-3.7.1.js' %}"></script>
    <script>
      $(function () {
        // 回到顶部
        $(window).scroll(function () {
          var scrollPosition = $(window).scrollTop();
          var documentHeight = $(document).height();
          var windowHeight = $(window).height();
          var per = scrollPosition / (documentHeight - windowHeight);

          if (scrollPosition > 500) {
            $("#back-to-top").css("display", "inline-flex");
          } else {
            $("#back-to-top").css("display", "none");
          }
          const offset = 307 - per * 307;
          //console.log(scrollPosition, per, offset);
          $(".top-circle").css({ "stroke-dashoffset": offset });
        });

        $("#back-to-top").click(function () {
          document.documentElement.scrollTo({
            top: 0,
            behavior: "smooth", // 平滑滚动
          });
        });
      });
    </script>

    {% block script %}{% endblock %}
