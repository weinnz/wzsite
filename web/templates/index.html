    <script>
function setCookie(name, value, days) {
        const date = new Date();
        date.setTime(date.getTime() + days * 24 * 60 * 60 * 1000);
        const expires = "expires=" + date.toUTCString();
        document.cookie = name + "=" + value + ";" + expires + ";path=/";
      }

      function getCookie(name) {
        const value = "; " + document.cookie;
        const parts = value.split("; " + name + "=");
        if (parts.length === 2) {
          return parts.pop().split(";").shift();
        }
        return "on";
      }
	</script>

    <script>
      $(function () {
        // logo
        $("#logo-icon").hover(
          function () {
            $("#logo-word").addClass("slideup");
          },
          function () {
            $("#logo-word").removeClass("slideup");
          },
        );

        // 开关灯
        $(".home-header").hover(
          function () {
            $(".lamp-icon").css("opacity", "1");
          },
          function () {
            $(".lamp-icon").css("opacity", "0");
          },
        );

        $(".lamp-container").click(function () {
          if ($("#open-lamp").css("display") == "none") {
            $("#open-lamp").css("display", "block");
            $("#close-lamp").css("display", "none");
            $(".overlay").css("opacity", "0.35");
		setCookie("lamp", "on", 100);
          } else {
            $("#open-lamp").css("display", "none");
            $("#close-lamp").css("display", "block");
            $(".overlay").css("opacity", "0.65");
		setCookie("lamp", "off", 100);
          }
        });

        // 背景图
        const imgs = $(".home-bg img");
        let img_index = 0;
        let next_index = 0;

        $(imgs[img_index]).addClass("show zoom");

        setInterval(() => {
          img_index = next_index;
          $(imgs[img_index]).removeClass("show");
          next_index = (img_index + 1) % imgs.length;
          $(imgs[next_index]).addClass("show zoom");
          setTimeout(() => {
            $(imgs[img_index]).removeClass("zoom");
          }, 3000);
        }, 5000);
      });
    </script>
  </body>
</html>
