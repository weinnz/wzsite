{% load static %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Search | Weinnz</title>
    <link rel="icon" href="{% static 'img/logo.jpg' %}" sizes="32x32" />
    <link
      rel="stylesheet"
      type="text/css"
      href="{% static 'css/search.css' %}"
    />
  </head>

  <body>
    <a href="/" class="logo-container">
      <img
        src="{% static 'img/logo-128x128.jpg' %}"
        width="100%"
        height="100%"
      />
    </a>

    <div class="search-container">
      <svg
        id="search-icon"
        viewBox="0 0 24 24"
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
      >
        <path
          d="M11.2553 18.5261C15.2665 18.5261 18.5183 15.2743 18.5183 11.2631C18.5183 7.25179 15.2665 4 11.2553 4C7.24397 4 3.99219 7.25179 3.99219 11.2631C3.99219 15.2743 7.24397 18.5261 11.2553 18.5261Z"
        ></path>
        <path d="M16.3613 16.3633L20.6894 20.6914"></path>
      </svg>
      <input
        id="myInput"
        type="search"
        placeholder="search blog, gallery, note or others"
      />
    </div>

    <div
      id="warning"
      style="
        width: 100%;
        visibility: hidden;
        font-size: 0.85rem;
        text-align: center;
        color: var(--gray-400);
        letter-spacing: 3rem;
        line-height: 3rem;
      "
    >
          好吧! 事实上，我还没做这个功能。<br />
      ↓在学别的东西。外加，嗯↓<br />
      /* 最近有点懒 */<br />
    </div>

    <script src="{% static 'plugins/jquery/jquery-3.7.1.js' %}"></script>
    <script>
      $(function () {
        $("#myInput").keydown(function (event) {
          if (event.which == 13) {
            $("#warning").css("visibility", "visible");
          }
        });
      });
    </script>
  </body>
</html>
